<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MCP Database Query App Chart</title>
<style>
:root {
    color-scheme: light dark;
    font-family: var(--font-sans, system-ui, sans-serif);
}
body {
    margin: 0;
    padding: 12px;
    background: var(--color-background-primary, Canvas);
    color: var(--color-text-primary, CanvasText);
    font-family: var(--font-sans, system-ui, sans-serif);
    display: flex;
    flex-direction: column;
    gap: 10px;
}
header {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
}
.controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    flex: 1;
}
label {
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--color-text-primary, CanvasText);
}
select {
    padding: 4px 6px;
    font-size: 13px;
    border: 1px solid var(--color-border-primary, #8884);
    background: var(--color-background-primary, Field);
    color: var(--color-text-primary, FieldText);
    border-radius: var(--border-radius-sm, 4px);
    font-family: var(--font-sans, system-ui, sans-serif);
}
button {
    padding: 4px 10px;
    font-size: 13px;
    border: 1px solid var(--color-border-primary, #8884);
    background: var(--color-background-secondary, ButtonFace);
    color: var(--color-text-primary, ButtonText);
    border-radius: var(--border-radius-sm, 4px);
    cursor: pointer;
    font-family: var(--font-sans, system-ui, sans-serif);
}
button:hover { filter: brightness(1.1); }
button[hidden] { display: none; }
.chart-wrap {
    position: relative;
    flex: 1;
    height: 420px;
    border: 1px solid var(--color-border-primary, #8884);
    border-radius: var(--border-radius-sm, 4px);
    padding: 4px;
}
canvas { width: 100% !important; height: 100% !important; }
.empty {
    padding: 12px;
    opacity: 0.7;
    text-align: center;
    color: var(--color-text-secondary, var(--color-text-primary, CanvasText));
}
</style>
</head>
<body>
<header>
    <div class="controls">
        <label>Chart type <select id="chartType">
            <option value="bar">Bar</option>
            <option value="line">Line</option>
            <option value="timeseries">Time series</option>
            <option value="pie">Pie</option>
            <option value="doughnut">Doughnut</option>
        </select></label>
        <label>X axis <select id="xAxis"></select></label>
        <label>Y axis <select id="yAxis"></select></label>
    </div>
    <button id="toggle-display" type="button" hidden>Maximize</button>
</header>
<div class="chart-wrap">
    <canvas id="chart"></canvas>
</div>
<div id="empty" class="empty" hidden>No data to chart.</div>
<noscript>
    <p>This view requires JavaScript. The results are also available in the tool's text output.</p>
</noscript>
