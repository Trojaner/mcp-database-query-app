name: Publish MCPB packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to attach the built .mcpb artifacts to (optional). Leave blank to only upload workflow artifacts."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-13
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Build MCPB (JIT) — Unix
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/publish-mcpb-jit.sh ${{ matrix.rid }}

      - name: Build MCPB (JIT) — Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/publish-mcpb-jit.ps1 ${{ matrix.rid }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-database-query-app-${{ matrix.rid }}-jit
          path: artifacts/mcpb/mcp-database-query-app-${{ matrix.rid }}-jit.mcpb
          if-no-files-found: error

  release:
    name: Attach artifacts to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: dist/*.mcpb
          generate_release_notes: true
          fail_on_unmatched_files: true
